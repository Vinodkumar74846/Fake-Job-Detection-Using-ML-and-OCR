<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction History</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e2a44;
            color: #ffffff;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #00b7eb;
        }
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #00b7eb;
            padding: 10px;
            text-align: left;
        }
        th {
            background-color: #2a3b5a;
        }
        tr:nth-child(even) {
            background-color: #3a4b6a;
        }
        .real {
            color: #00ff00;
        }
        .fake {
            color: #ff0000;
        }
        .button {
            display: inline-block;
            padding: 12px 24px;
            font-size: 18px;
            color: white;
            background-color: #00b7eb;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
            cursor: pointer;
            margin: 10px;
        }
        .button:hover {
            background-color: #0099cc;
        }
        .button-container {
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>Prediction History</h1>
    <div class="button-container">
        <a href="/upload" class="button">Back to Upload</a>
        <a href="/logout" class="button">Logout</a>
    </div>
    {% if history %}
    <table>
        <tr>
            <th>Source</th>
            <th>Processed Text (Preview)</th>
            <th>Prediction</th>
        </tr>
        {% for item in history %}
        <tr>
            <td>{{ item.source }}</td>
            <td>{{ item.processed_text[:50] }}...</td>
            <td class="{{ 'real' if item.prediction == 'Real' else 'fake' }}">{{ item.prediction }}</td>
        </tr>
        {% endfor %}
    </table>
    {% else %}
    <p>No prediction history found.</p>
    {% endif %}
</body>
</html>
